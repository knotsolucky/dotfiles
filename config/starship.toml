add_newline = true

# Dark pastel: dusty tinted backgrounds + soft pastel fg (easy on OLED/dark themes).
format = """${custom.session}$hostname$username$directory$fill$time$cmd_duration
$character"""

[custom.session]
command = "printf ''"
shell = ["sh", "-c"]
when = "true"
style = "bg:#3d3558 fg:#c4b5fd"
format = "[  ]($style)"

[os]
disabled = true

[shell]
disabled = true

[hostname]
ssh_only = false
style = "bg:#1e3a32 fg:#86efac"
format = "[  $hostname ]($style)"

[username]
show_always = true
style_user = "bg:#3d3028 fg:#fdba74 bold"
style_root = "bg:#44252d fg:#fca5a5 bold"
format = "[  $user ]($style)"

[directory]
style = "bg:#1e3a5f fg:#93c5fd bold"
format = "[  $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[fill]
symbol = " "

[time]
disabled = false
time_format = "%R"
style = "bg:#362f4a fg:#d8b4fe"
format = "[  $time ]($style)"

[cmd_duration]
min_time = 0
style = "bg:#4a2538 fg:#f9a8d4 bold"
format = "[ 󱎫 $duration ]($style)"

[character]
success_symbol = "[>](bold #86efac) "
error_symbol = "[>](bold #fca5a5) "
