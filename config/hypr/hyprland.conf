################
### MONITORS ###
################

monitor = DP-1, 3440x1440@175, 0x0, 1

###################
### MY PROGRAMS ###
###################

$terminal = kitty
$fileManager = nautilus 
$menu = rofi -show run

#################
### AUTOSTART ###
#################

exec-once = playerctld &
# Eww: start daemon then open bar (parallel exec-once lines race; tray-only Waybar removed — no system tray strip / gap).
exec-once = sh -c 'eww daemon & sleep 0.5; eww open bar'
exec-once = hyprpaper
exec-once = hypridle
exec-once = swaync
exec-once = waybar
exec-once = walker --gapplication-service &
exec-once = elephant &


#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 5
    col.active_border = rgba(c084fccc) rgba(7c3aedcc) 45deg
    col.inactive_border = rgba(ffffff1a)
    layout = dwindle
    resize_on_border = true
    allow_tearing = false
}

decoration {
    rounding = 0
    active_opacity = 0.90
    inactive_opacity = 0.50
    fullscreen_opacity = 1.0

    shadow {
        enabled = false 
        range = 8
        render_power = 4
        color = rgba(000000ee)
    }

    blur {
        enabled = true
        size = 6
        passes = 2
        new_optimizations = true
        ignore_opacity = true
        xray = true
    }
}

animations {
    enabled = yes

    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear, 0, 0, 1, 1
    bezier = almostLinear, 0.5, 0.5, 0.75, 1
    bezier = quick, 0.15, 0, 0.1, 1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    # Shorter workspace slide (less flicker when switching persistent slots)
    animation = workspaces, 1, 1.35, easeOutQuint, slide
    animation = workspacesIn, 1, 1.35, easeOutQuint, slide
    animation = workspacesOut, 1, 1.35, easeOutQuint, slide
    animation = zoomFactor, 1, 7, quick
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = false
}

layerrule = blur on, match:namespace eww-bar


#############
### INPUT ###
#############

input {
    kb_layout = gb
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}

gesture = 3, horizontal, workspace


###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, ESCAPE, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, P, pseudo,
bind = $mainMod, D, exec, eww open --toggle dashboard
bind = $mainMod, SPACE, exec, walker
bind = $mainMod, J, layoutmsg, togglesplit
bind = $mainMod, N, exec, swaync-client -t -sw

# hypridle.conf lock_cmd should match
bind = $mainMod, L, exec, pidof hyprlock || hyprlock

bind = , Print, exec, hyprshot -m region
bind = $mainMod, Print, exec, hyprshot -m active -m window
bind = $mainMod SHIFT, Print, exec, hyprshot -m active -m output

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous


##############################
### WINDOWS AND WORKSPACES ###
##############################

# Opaque browsers only (everything else uses decoration active/inactive opacity above).
windowrule {
    name = opaque-browser-firefox
    match:class = ^(firefox|org.mozilla.firefox|LibreWolf|librewolf)$
    opaque = on
}

windowrule {
    name = opaque-browser-chromium-family
    match:class = ^(Google-chrome|google-chrome|chromium|Brave-browser|brave|Vivaldi-stable|vivaldi|Microsoft-edge|microsoft-edge|zen|Zen)$
    opaque = on
}

windowrule {
    name = opaque-browser-flatpak
    match:class = ^(com.google.Chrome|com.brave.Browser|org.chromium.Chromium)$
    opaque = on
}

windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

windowrule {
    name = move-hyprland-run
    match:class = hyprland-run
    move = 20 monitor_h-120
    float = yes
}

windowrule {
    name = fetch-ui-card
    match:class = fetch-ui
    float = yes
    size = 496 404
    center = yes
    rounding = 40
}

windowrule {
    name = walker-launcher-rounding
    match:class = ^(walker|Walker)$
    rounding = 8
}

windowrule {
    name = wlogout-menu
    match:class = ^wlogout$
    float = yes
    center = yes
    size = 560 320
    rounding = 8
}

windowrule {
    name = rofi-menu-rounding
    match:class = ^(Rofi|rofi)$
    rounding = 8
}
