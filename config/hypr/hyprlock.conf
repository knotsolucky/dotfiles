# https://wiki.hypr.land/Hypr-Ecosystem/hyprlock/
# Without this file, hyprlock locks to a black screen with no UI feedback.

$font = SFMono Nerd Font

general {
    hide_cursor = false
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
}

input-field {
    monitor =
    size = 20%, 5%
    outline_thickness = 3
    inner_color = rgba(0, 0, 0, 0.0)

    outer_color = rgba(333333ee) rgba(33ccffee) 45deg
    check_color = rgba(00ff99ee) rgba(ff6633ee) 120deg
    fail_color = rgba(ff6633ee) rgba(ff0066ee) 40deg

    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    rounding = 15

    font_family = $font
    placeholder_text = Password…
    fail_text = $PAMFAIL

    dots_spacing = 0.3

    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    font_size = 90
    font_family = $font
    color = rgba(220, 220, 220, 1.0)

    position = -30, 0
    halign = right
    valign = top
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y"
    font_size = 25
    font_family = $font
    color = rgba(180, 180, 180, 1.0)

    position = -30, -150
    halign = right
    valign = top
}

label {
    monitor =
    text = Hi, $USER
    font_size = 22
    font_family = $font
    color = rgba(160, 160, 160, 1.0)

    position = 0, 120
    halign = center
    valign = center
}
