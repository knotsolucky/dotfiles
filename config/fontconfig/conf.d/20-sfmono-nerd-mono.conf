<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Prefer SF Mono Nerd when apps ask for generic "monospace" (rofi, some GTK). -->
  <alias>
    <family>monospace</family>
    <prefer>
      <family>SFMono Nerd Font</family>
      <family>Liga SFMono Nerd Font</family>
    </prefer>
  </alias>
</fontconfig>
