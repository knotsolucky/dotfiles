add_newline = true
format = """$os$hostname$username$directory$fill$time$cmd_duration
$character"""

[os]
disabled = false
style = "bg:#0088cc fg:#ffffff" # Arch Blue
format = "[ $symbol ]($style)"

[os.symbols]
Arch = "󰣇"

[hostname]
style = "bg:#334155 fg:#f1f5f9"
format = "[$hostname ]($style)"

[username]
show_always = true
style_user = "bg:#005f87 fg:#ffffff bold" # Darker Blue
style_root = "bg:#b91c1c fg:#ffffff bold"
format = "[  $user ]($style)"

[directory]
style = "bg:#00aaff fg:#000000 bold" # Bright Cyan
format = "[  $path ]($style)"

[fill]
symbol = " "

[time]
style = "bg:#262626 fg:#00aaff"
format = "[  $time ]($style)"

[cmd_duration]
style = "bg:#444444 fg:#00aaff bold"
format = "[ 󱎫 $duration ]($style)"

[character]
success_symbol = "[❯](bold #00aaff) "
error_symbol = "[❯](bold #f87171) "
